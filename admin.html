<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Admin</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    textarea { width: 100%; height: 200px; }
    button { margin-top: 10px; padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>Simple Menu Editor</h1>
  <p>Edit the JSON menu below:</p>
  <textarea id="menuEditor">["Home","About","Contact"]</textarea><br>
  <button onclick="saveMenu()">Save Menu</button>

  <script>
    function saveMenu() {
      const menu = document.getElementById('menuEditor').value;
      try {
        const parsed = JSON.parse(menu);
        alert("Menu saved locally! (Copy this to update your site files)\n\n" + JSON.stringify(parsed, null, 2));
      } catch(e) {
        alert("Invalid JSON: " + e.message);
      }
    }
  </script>
</body>
</html>
